name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --registry https://registry.npmjs.org

      - name: Run Jest Test Suite
        run: npm test

      - name: Build dist/index.js
        run: npm run build

      - name: Verify dist artifact exists
        run: test -f dist/index.js && echo "✅ dist/index.js built successfully"
