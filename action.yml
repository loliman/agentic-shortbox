name: 'Agentic Shortbox — AI Developer Bot'
description: 'A GitHub-native AI bot that plans, implements, and reviews code via Issue comments using OpenAI Codex.'
author: 'christian-riese'

branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  openai-api-key:
    description: 'OpenAI API Key for running Codex. If omitted, the action will stay offline.'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'
